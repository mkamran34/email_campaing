<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email System - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            max-width: 900px;
            width: 95%;
        }

        .login-form-section {
            flex: 1;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-brand h1 {
            color: #2d3748;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .login-brand p {
            color: #718096;
            font-size: 0.95rem;
        }

        .tab-switcher {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e2e8f0;
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 500;
            color: #a0aec0;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2d3748;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-remember {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            color: #4a5568;
        }

        .form-remember input {
            width: auto;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 0.85rem 1.5rem;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .alert {
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .alert.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        .alert.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .alert i {
            font-size: 1.2rem;
        }

        .login-image-section {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 2rem;
            display: none;
        }

        .login-image-section.show {
            display: flex;
        }

        .login-image-section i {
            font-size: 5rem;
            margin-bottom: 1rem;
            opacity: 0.9;
        }

        .login-image-section h2 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .login-image-section p {
            text-align: center;
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .footer-text {
            text-align: center;
            color: #718096;
            font-size: 0.85rem;
            margin-top: 1.5rem;
        }

        .loading {
            display: none;
        }

        .loading.show {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        @keyframes spin {
            to { transform: translateX(-50%) rotate(360deg); }
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            position: relative;
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }

            .login-form-section {
                padding: 2rem 1.5rem;
            }

            .login-image-section {
                display: none !important;
            }

            .login-brand h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Login Form Section -->
        <div class="login-form-section">
            <div class="login-brand">
                <h1><i class="fas fa-envelope"></i> Email System</h1>
                <p>Professional Email Management</p>
            </div>

            <!-- Tab Switcher -->
            <div class="tab-switcher">
                <button class="tab-btn active" data-tab="login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button class="tab-btn" data-tab="register">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </div>

            <!-- Login Form -->
            <div class="tab-content active" id="login-tab">
                <div id="loginAlert"></div>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginUsername"><i class="fas fa-user"></i> Username or Email</label>
                        <input type="text" id="loginUsername" name="username" required placeholder="Enter your username or email">
                    </div>

                    <div class="form-group">
                        <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="loginPassword" name="password" required placeholder="Enter your password">
                    </div>

                    <div class="form-remember">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <label for="rememberMe" style="margin: 0;">Remember me for 7 days</label>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <span class="btn-text">Sign In</span>
                        <span class="loading"></span>
                    </button>
                </form>

                <div class="footer-text">
                    Don't have an account? <a href="#" onclick="switchTab('register'); return false;" style="color: #667eea; text-decoration: none; font-weight: 600;">Register here</a>
                </div>
            </div>

            <!-- Register Form -->
            <div class="tab-content" id="register-tab">
                <div id="registerAlert"></div>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="registerUsername"><i class="fas fa-user"></i> Username</label>
                        <input type="text" id="registerUsername" name="username" required placeholder="Choose a username">
                    </div>

                    <div class="form-group">
                        <label for="registerEmail"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="registerEmail" name="email" required placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label for="registerName"><i class="fas fa-id-card"></i> Full Name</label>
                        <input type="text" id="registerName" name="full_name" placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label for="registerPassword"><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="registerPassword" name="password" required placeholder="At least 8 characters" minlength="8">
                    </div>

                    <div class="form-group">
                        <label for="registerPassword2"><i class="fas fa-lock"></i> Confirm Password</label>
                        <input type="password" id="registerPassword2" name="password2" required placeholder="Confirm password" minlength="8">
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <span class="btn-text">Create Account</span>
                        <span class="loading"></span>
                    </button>
                </form>

                <div class="footer-text">
                    Already have an account? <a href="#" onclick="switchTab('login'); return false;" style="color: #667eea; text-decoration: none; font-weight: 600;">Sign in here</a>
                </div>
            </div>
        </div>

        <!-- Image Section -->
        <div class="login-image-section show">
            <i class="fas fa-paper-plane"></i>
            <h2>Welcome Back!</h2>
            <p>Manage emails efficiently with our professional dashboard</p>
        </div>
    </div>

    <script>
        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.parentElement.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            
            // Activate the clicked button
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tab = e.currentTarget.dataset.tab;
                switchTab(tab);
            });
        });

        // Show alert message
        function showAlert(alertId, message, type = 'error') {
            const alert = document.getElementById(alertId);
            const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
            alert.innerHTML = `<i class="fas ${icon}"></i> <span>${message}</span>`;
            alert.className = `alert ${type}`;
            alert.style.display = 'flex';
            
            if (type === 'success') {
                setTimeout(() => alert.style.display = 'none', 3000);
            }
        }

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            const btn = e.target.querySelector('.btn-primary');
            btn.disabled = true;
            btn.querySelector('.loading').classList.add('show');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, remember_me: rememberMe })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showAlert('loginAlert', 'Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    showAlert('loginAlert', data.error || 'Login failed. Please try again.');
                }
            } catch (error) {
                showAlert('loginAlert', 'An error occurred. Please try again.');
            } finally {
                btn.disabled = false;
                btn.querySelector('.loading').classList.remove('show');
            }
        });

        // Register form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const full_name = document.getElementById('registerName').value;
            const password = document.getElementById('registerPassword').value;
            const password2 = document.getElementById('registerPassword2').value;
            
            if (password !== password2) {
                showAlert('registerAlert', 'Passwords do not match.');
                return;
            }
            
            const btn = e.target.querySelector('.btn-primary');
            btn.disabled = true;
            btn.querySelector('.loading').classList.add('show');
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, full_name, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showAlert('registerAlert', 'Registration successful! Logging you in...', 'success');
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    showAlert('registerAlert', data.error || 'Registration failed. Please try again.');
                }
            } catch (error) {
                showAlert('registerAlert', 'An error occurred. Please try again.');
            } finally {
                btn.disabled = false;
                btn.querySelector('.loading').classList.remove('show');
            }
        });
    </script>
</body>
</html>
